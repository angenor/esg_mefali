[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*
markers =
    postgres: requires a running PostgreSQL (set TEST_ALEMBIC_URL) — skipped otherwise
    s3: requires moto[s3] mock server (Story 10.6) — skipped if moto absent
    unit: pure unit test (no DB, no LLM, no FS) — Story 10.8 et suivantes
    integration: requires network access (set SOURCE_URL_CHECK=1) — Story 10.11, skipped otherwise
