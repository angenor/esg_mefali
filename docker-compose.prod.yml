# ==========================================
# ESG Mefali - Production (cohabitation VPS)
# ==========================================
# Cette configuration suppose qu'un reverse proxy
# externe (ex: nginx UAfricas) gere le SSL et le
# routage du domaine esg.mefali.com vers :
#   - http://127.0.0.1:${FRONTEND_PORT}  (Nuxt SSR)
#   - http://127.0.0.1:${BACKEND_PORT}   (FastAPI)
#
# Voir nginx/esg-mefali-vhost.conf.example pour la
# configuration a ajouter au nginx reverse proxy.
# ==========================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: esg_mefali_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Expose uniquement en local pour eviter le conflit avec d'autres Postgres
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esg_mefali_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: esg_mefali_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-sonnet-4-20250514}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DEBUG: "false"
    # Expose uniquement sur localhost : le reverse proxy (nginx UAfricas)
    # route le trafic via 127.0.0.1:BACKEND_PORT
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8010}:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - esg_mefali_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NUXT_PUBLIC_API_BASE: /api
    container_name: esg_mefali_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: /api
    # Expose uniquement sur localhost pour le reverse proxy externe
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3010}:3000"
    depends_on:
      - backend
    networks:
      - esg_mefali_net

volumes:
  postgres_data:
  backend_uploads:

networks:
  esg_mefali_net:
    driver: bridge
