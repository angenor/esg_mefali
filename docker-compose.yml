services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: esg_mefali_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: esg_mefali
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO — mock S3 local (Story 10.7 AC2). DEV uniquement — 100% API
  # compatible S3, permet tester STORAGE_PROVIDER=s3 sans compte AWS.
  minio:
    image: minio/minio:latest
    container_name: esg_mefali_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API S3
      - "9001:9001"  # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sidecar mc — crée le bucket `mefali-dev` au démarrage (idempotent).
  # Tourne une fois et exit — pas de service long-running.
  minio-bucket-init:
    image: minio/mc:latest
    container_name: esg_mefali_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/mefali-dev;
      mc anonymous set download local/mefali-dev;
      exit 0;
      "
    restart: "no"

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/esg_mefali
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-sonnet-4-20250514}
      DEBUG: ${DEBUG:-true}
      # Story 10.7 AC1/AC2 — environnement DEV + mock S3 MinIO
      ENV_NAME: ${ENV_NAME:-dev}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-mefali-dev}
      AWS_REGION: ${AWS_REGION:-eu-west-3}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
