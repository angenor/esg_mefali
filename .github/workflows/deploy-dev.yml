# Story 10.7 AC8 — Workflow DEV (tests + smoke uniquement en MVP)
# ============================================================================
# DEV = local docker-compose. Pas de cluster partagé MVP.
# Ce workflow valide que les tests passent après chaque merge vers `main`.
# ============================================================================

name: Deploy DEV

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests backend + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: backend
        env:
          ENV_NAME: dev
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/test"
        run: pytest -q --tb=short

      - name: Run ruff lint
        working-directory: backend
        run: ruff check app/ tests/ scripts/

  anti-wildcard-guard:
    name: IAM anti-wildcard guard (AC4 + Task 12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Scan for forbidden IAM wildcards (MEDIUM-10.7-3 strict regex)
        run: |
          # Batterie exhaustive anti-wildcard — chaque regex matche un vecteur
          # distinct. Un seul hit → fail. Compléments au grep basique Story 10.7.
          FORBIDDEN=(
            'Resource"?\s*[:=]\s*"\*"'          # Resource = "*"
            'Resource"?\s*[:=]\s*\[\s*"\*"'     # Resource = ["*"]
            'Action"?\s*[:=]\s*"\*"'            # Action = "*"
            'Action"?\s*[:=]\s*\[\s*"\*"'       # Action = ["*"]
            '"s3:\*"'                           # s3:* wildcard action
            '"arn:aws:s3:::\*"'                 # bucket wildcard exact
            '"arn:aws:\*"'                      # all services wildcard
            '"arn:aws:[a-z0-9-]+:\*"'           # single service all resources
          )
          FOUND=0
          for pattern in "${FORBIDDEN[@]}"; do
            if rg -n "$pattern" infra/terraform/; then
              echo "::error::IAM wildcard detected — pattern: $pattern"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 1 ]; then
            echo "::error::Wildcards interdits (Story 10.7 AC4 + review MEDIUM-10.7-3)"
            exit 1
          fi
          echo "✅ No IAM wildcards detected (8 patterns checked)"

  smoke-test-dev:
    name: Smoke tests DEV (docker-compose)
    runs-on: ubuntu-latest
    needs: [test, anti-wildcard-guard]
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Check MinIO service present
        run: |
          grep -q "minio:" docker-compose.yml || exit 1
          grep -q "MINIO_ROOT_USER" docker-compose.yml || exit 1
          echo "✅ MinIO service configured"
