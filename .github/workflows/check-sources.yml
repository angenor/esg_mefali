# Story 10.11 AC2/AC5 — Nightly source_url health-check (FR63, CCC-6)
# ============================================================================
# Trigger   : cron 03:00 UTC quotidien + workflow_dispatch manuel.
# Source    : BDD staging read-only (secret STAGING_DATABASE_URL_READ_ONLY).
# Pipeline  : python backend/scripts/check_source_urls.py --output report.json.
# Rapport   : artifact `source-url-report` (retention 14 j).
# Alerting  : issue GitHub auto via peter-evans/create-issue-from-file@v5 si
#             au moins une source est KO (AC5 — pas de Mailgun MVP, Q4).
# Permissions minimales : contents:read + issues:write (pas de write-all).
# ============================================================================

name: Check Source URLs (nightly FR63)

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC quotidien (Q3 — creux UEMOA/Paris)
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # création issue auto sur fail via peter-evans action

jobs:
  check-sources:
    name: Check source_url HTTP HEAD
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install runtime dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run source_url check
        id: check
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL_READ_ONLY }}
        run: |
          set -euo pipefail
          python scripts/check_source_urls.py --output ../report.json
          FAILURES=$(python -c "import json, sys; r=json.load(open('../report.json')); print(sum(v for k,v in r['counts'].items() if k != 'ok'))")
          echo "failure_count=${FAILURES}" >> "$GITHUB_OUTPUT"
          if [ "${FAILURES}" -gt 0 ]; then
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-url-report
          path: report.json
          retention-days: 14

      - name: Build issue body
        if: steps.check.outputs.has_failures == 'true'
        working-directory: backend
        run: |
          python scripts/format_issue_body.py ../report.json > ../issue_body.md

      - name: Create GitHub issue (on KO)
        if: steps.check.outputs.has_failures == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "[source-tracking] ${{ steps.check.outputs.failure_count }} sources KO detectees ${{ github.run_started_at }}"
          content-filepath: issue_body.md
          labels: |
            source-tracking
            admin-action-required
