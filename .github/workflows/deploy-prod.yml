# Story 10.7 AC8 — Workflow PROD (manual only + confirmation phrase)
# ============================================================================
# Trigger : workflow_dispatch UNIQUEMENT (pas de push auto).
# Input : confirmation_phrase DOIT égaler "DEPLOY TO PRODUCTION" (fail sinon).
# Approval : GitHub Environment `prod` (required reviewers UI-configured).
# Audit trail : GitHub Actions audit log (immutable).
# ============================================================================

name: Deploy PROD

on:
  workflow_dispatch:
    inputs:
      confirmation_phrase:
        description: 'Tapez exactement : DEPLOY TO PRODUCTION'
        required: true
        type: string
      container_image_tag:
        description: 'Tag de l''image backend (ex: v1.0.0, sha-abc1234)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: eu-west-3
  TF_WORKING_DIR: infra/terraform/envs/prod

jobs:
  verify-confirmation:
    name: Verify confirmation phrase
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation_phrase exact match
        run: |
          if [ "${{ inputs.confirmation_phrase }}" != "DEPLOY TO PRODUCTION" ]; then
            echo "::error::confirmation_phrase must be exactly 'DEPLOY TO PRODUCTION'"
            echo "::error::Got: '${{ inputs.confirmation_phrase }}'"
            exit 1
          fi
          echo "✅ Confirmation phrase validated"

  test:
    name: Tests backend
    runs-on: ubuntu-latest
    needs: verify-confirmation
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        working-directory: backend
        env:
          ENV_NAME: prod
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/test"
          DEBUG: "false"
        run: pytest -q --tb=short

  anti-wildcard-guard:
    name: IAM anti-wildcard guard
    runs-on: ubuntu-latest
    needs: verify-confirmation
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - name: Scan for forbidden IAM wildcards (MEDIUM-10.7-3 strict)
        run: |
          FORBIDDEN=(
            'Resource"?\s*[:=]\s*"\*"'
            'Resource"?\s*[:=]\s*\[\s*"\*"'
            'Action"?\s*[:=]\s*"\*"'
            'Action"?\s*[:=]\s*\[\s*"\*"'
            '"s3:\*"'
            '"arn:aws:s3:::\*"'
            '"arn:aws:\*"'
            '"arn:aws:[a-z0-9-]+:\*"'
          )
          FOUND=0
          for pattern in "${FORBIDDEN[@]}"; do
            if rg -n "$pattern" infra/terraform/; then
              echo "::error::Wildcard: $pattern"
              FOUND=1
            fi
          done
          [ $FOUND -eq 1 ] && exit 1
          echo "✅ No IAM wildcards (8 patterns checked)"

  terraform-plan-prod:
    name: Terraform plan PROD
    runs-on: ubuntu-latest
    needs: [test, anti-wildcard-guard]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -out=prod.tfplan
        env:
          TF_VAR_container_image: ghcr.io/${{ github.repository }}/backend:${{ inputs.container_image_tag }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-tfplan
          path: ${{ env.TF_WORKING_DIR }}/prod.tfplan
          retention-days: 30

  terraform-apply-prod:
    name: Terraform apply PROD
    runs-on: ubuntu-latest
    needs: terraform-plan-prod
    # GitHub Environment 'prod' — required reviewers + deployment branches
    # restrictions configurés manuellement dans Settings → Environments
    environment:
      name: prod
      url: https://mefali.example
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: prod-tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false prod.tfplan

  smoke-tests-prod:
    name: Smoke tests PROD
    runs-on: ubuntu-latest
    needs: terraform-apply-prod
    steps:
      - uses: actions/checkout@v4
      - name: Health check
        run: |
          # TODO: prod URL à définir une fois DNS configuré
          # curl -fsS https://mefali.example/api/health
          echo "Smoke test placeholder — URL to configure post-bootstrap"

  notify-success:
    name: Notify deployment success
    runs-on: ubuntu-latest
    needs: smoke-tests-prod
    steps:
      - name: Log success
        run: echo "✅ PROD deployed — tag ${{ inputs.container_image_tag }} at $(date -u)"
