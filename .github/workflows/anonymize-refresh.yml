# Story 10.7 AC5/AC8 — Refresh STAGING mensuel (anonymisation PROD→STAGING)
# ============================================================================
# Trigger : cron 1er du mois 02:00 UTC + workflow_dispatch manuel.
# Source : snapshot RDS PROD → pg_dump filtré (BLOB exclus en amont).
# Anonymise via scripts/anonymize_prod_to_staging.py (15 patterns PII FR/AO).
# Fail-fast : exit ≠ 0 si pattern résiduel (AnonymizationPatternViolation).
# Audit : GitHub Environment `staging` (required reviewers UI-configured).
# ============================================================================

name: Refresh STAGING (anonymized copy PROD→STAGING)

on:
  schedule:
    - cron: '0 2 1 * *' # 1er du mois, 02:00 UTC (Q4 tranchée Story 10.7)
  workflow_dispatch:

permissions:
  id-token: write # OIDC assume-role (pattern aligné deploy-staging.yml)
  contents: read
  issues: write # Création issue auto sur fail (Phase Growth optionnel)

env:
  AWS_REGION: eu-west-3
  SNAPSHOT_PREFIX: refresh-staging

jobs:
  anonymize-and-restore:
    name: Dump PROD → anonymize → restore STAGING
    runs-on: ubuntu-latest
    # Gate approval même en cron — audit trail immutable (required reviewers UI)
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Configure AWS credentials (OIDC — STAGING role assumes PROD read-only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Le rôle staging assume un rôle PROD read-only dédié au refresh
          # (cross-account pattern déféré DEF-10.7-4 — MVP : même compte)
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create PROD snapshot + export pg_dump filtered
        env:
          SNAPSHOT_ID: ${{ env.SNAPSHOT_PREFIX }}-${{ github.run_id }}
        run: |
          # Snapshot RDS PROD (non-bloquant — AWS managed)
          aws rds create-db-snapshot \
            --db-snapshot-identifier "$SNAPSHOT_ID" \
            --db-instance-identifier mefali-prod
          aws rds wait db-snapshot-completed --db-snapshot-identifier "$SNAPSHOT_ID"

          # TODO bootstrap : restaurer snapshot dans instance temporaire +
          # pg_dump --exclude-table=documents --exclude-table=reports > /tmp/prod.sql
          # Placeholder MVP — la procédure complète est documentée runbook §4.
          echo "Snapshot $SNAPSHOT_ID created — pg_dump step requires VPC setup (runbook §4)"
          # Pour le MVP automatisé : utilise un dump pré-filtré uploadé via CLI ops
          # Prochaine itération : pipeline bastion + pg_dump direct (DEF-10.7-3 EventBridge)

      - name: Anonymize dump (fail-fast 15 patterns PII FR/AO)
        env:
          ANONYMIZATION_SALT: ${{ secrets.ANONYMIZATION_SALT }}
        working-directory: backend
        run: |
          if [ ! -f /tmp/prod.sql ]; then
            echo "::warning::Dump /tmp/prod.sql absent — placeholder MVP (runbook §4)"
            echo "Étapes manuelles documentées dans docs/runbooks/README.md §4 Refresh STAGING"
            exit 0 # MVP : cron documente la cadence, pipeline complet = Phase Growth
          fi
          python -m scripts.anonymize_prod_to_staging \
            --source /tmp/prod.sql \
            --output /tmp/staging.sql

      - name: Restore anonymized dump to STAGING
        env:
          STAGING_DB_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ ! -f /tmp/staging.sql ]; then
            echo "::notice::Placeholder MVP — restore skip (runbook §4)"
            exit 0
          fi
          psql "$STAGING_DB_URL" -f /tmp/staging.sql

      - name: Log refresh metadata
        if: always()
        run: |
          echo "✅ Refresh STAGING run_id=${{ github.run_id }} at $(date -u)"
          echo "Audit trail : GitHub Actions log immutable"

  notify-failure:
    name: Create GitHub issue on failure
    runs-on: ubuntu-latest
    needs: anonymize-and-restore
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - name: Open failure issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "🚨 Refresh STAGING failed ($(date -u +%Y-%m-%d))" \
            --body "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}%0A%0ACheck runbook §4 Refresh STAGING + anonymization fail-fast logs." \
            --label "ops,infra,story-10.7"
