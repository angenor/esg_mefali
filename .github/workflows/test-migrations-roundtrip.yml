name: test-migrations-roundtrip

# AC10 Story 10.1 — gate de merge pour toute PR touchant les migrations
# Alembic. Lance le round-trip upgrade/downgrade/upgrade sur un vrai
# PostgreSQL 16 en container GitHub Actions.

on:
  pull_request:
    paths:
      - "backend/alembic/versions/**"
      - "backend/alembic/env.py"
      - "backend/alembic.ini"
      - "backend/tests/test_migrations/**"
      - "backend/tests/test_security/**"
  push:
    branches: [main]
    paths:
      - "backend/alembic/versions/**"

jobs:
  roundtrip:
    name: Round-trip upgrade/downgrade/upgrade
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_mefali
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Enable pgcrypto extension
        env:
          PGPASSWORD: test
        run: |
          psql -h localhost -U test -d test_mefali -c \
            "CREATE EXTENSION IF NOT EXISTS pgcrypto; CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run migration round-trip tests
        working-directory: backend
        env:
          TEST_ALEMBIC_URL: "postgresql+psycopg2://test:test@localhost:5432/test_mefali"
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test_mefali"
        run: |
          pytest -m postgres \
            tests/test_migrations/ \
            tests/test_security/ \
            -v --tb=short

      - name: Validate schema script
        working-directory: backend
        env:
          TEST_ALEMBIC_URL: "postgresql+psycopg2://test:test@localhost:5432/test_mefali"
        run: |
          python scripts/validate_schema.py
