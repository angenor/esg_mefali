# Story 10.7 AC8 — Workflow STAGING
# ============================================================================
# Trigger : push sur branche `staging` (branch protection + PR requise).
# Approval : GitHub Environment `staging` (1 reviewer min — configuré UI).
# ============================================================================

name: Deploy STAGING

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  id-token: write # Pour AWS OIDC assume-role
  contents: read

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: eu-west-3
  TF_WORKING_DIR: infra/terraform/envs/staging

jobs:
  test:
    name: Tests backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: backend
        env:
          ENV_NAME: staging
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/test"
        run: pytest -q --tb=short

  anti-wildcard-guard:
    name: IAM anti-wildcard guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - name: Scan for forbidden IAM wildcards (MEDIUM-10.7-3 strict)
        run: |
          FORBIDDEN=(
            'Resource"?\s*[:=]\s*"\*"'
            'Resource"?\s*[:=]\s*\[\s*"\*"'
            'Action"?\s*[:=]\s*"\*"'
            'Action"?\s*[:=]\s*\[\s*"\*"'
            '"s3:\*"'
            '"arn:aws:s3:::\*"'
            '"arn:aws:\*"'
            '"arn:aws:[a-z0-9-]+:\*"'
          )
          FOUND=0
          for pattern in "${FORBIDDEN[@]}"; do
            if rg -n "$pattern" infra/terraform/; then
              echo "::error::Wildcard: $pattern"
              FOUND=1
            fi
          done
          [ $FOUND -eq 1 ] && exit 1
          echo "✅ No IAM wildcards (8 patterns checked)"

  terraform-plan:
    name: Terraform plan STAGING
    runs-on: ubuntu-latest
    needs: [test, anti-wildcard-guard]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -out=staging.tfplan
        env:
          TF_VAR_container_image: ghcr.io/${{ github.repository }}/backend:staging-${{ github.sha }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-tfplan
          path: ${{ env.TF_WORKING_DIR }}/staging.tfplan
          retention-days: 7

  terraform-apply:
    name: Terraform apply STAGING
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment:
      name: staging # GitHub Environment — required reviewers UI-configured
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false staging.tfplan

  smoke-tests-staging:
    name: Smoke tests STAGING
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - uses: actions/checkout@v4
      - name: Health check
        run: |
          # TODO: staging URL à définir une fois DNS configuré
          # curl -fsS https://staging.mefali.example/api/health
          echo "Smoke test placeholder — URL to configure post-bootstrap"
